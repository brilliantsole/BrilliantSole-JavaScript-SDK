<html>
  <head>
    <title>Center of Pressure | BrilliantSole JavaScript SDK</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <script type="module" src="./script.js"></script>
    <script src="../utils/misc/canvasInput.js"></script>
  </head>

  <style>
    #centerOfPressureContainer {
      height: 300px;
      aspect-ratio: 1;
      border: solid black;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      margin-top: 2rem;
    }

    #centerOfPressureRange {
      width: calc(100% - 2rem);
      height: calc(100% - 2rem);
      margin: auto;
      position: relative;
    }

    #centerOfPressureRange2 {
      width: calc(100% - 1rem);
      height: calc(100% - 1rem);
      margin: auto;
      top: 0.5rem;
      position: relative;
    }

    #centerOfPressure {
      position: absolute;
      width: 1rem;
      height: 1rem;
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    #centerOfPressure .visual {
      border-radius: 50%;
      background-color: red;
      width: 100%;
      height: 100%;

      position: relative;
    }

    #target {
      position: absolute;
      display: none;
    }
    #target .visual {
      border-radius: 15px;
      background-color: yellow;
      width: 100%;
      height: 100%;
      display: flex;
    }
    #target .ring {
      box-sizing: border-box;
      border: solid blue thick;
      border-radius: 15px;
      width: 100%;
      height: 100%;
      margin: auto;
    }

    #target.hover .visual {
      background-color: limegreen;
    }

    #target:not(.hover) .ring {
      display: none;
    }

    @keyframes shrink {
      from {
        width: 100%;
        height: 100%;
      }
      to {
        width: 0%;
        height: 0%;
      }
    }

    #target.hover .ring {
      animation-name: shrink;
      animation-duration: 2s;
      animation-timing-function: linear;
    }

    #glassesDisplay {
      background-color: black;
    }
  </style>

  <body>
    <nav>
      <a href="../../">home</a>
    </nav>

    <h1>Center of Pressure | BrilliantSole JavaScript SDK</h1>

    <div>
      <h2>available devices</h2>
      <div id="availableDevices">
        <template id="availableDeviceTemplate">
          <div class="availableDevice">
            <ul>
              <li><b>name: </b> <span class="name"></span></li>
              <li><b>type: </b> <span class="type"></span></li>
              <li><button class="toggleConnection">connect</button></li>
            </ul>
          </div>
        </template>
      </div>
    </div>

    <br />

    <div>
      <button id="addDevice">add device</button>
      <button id="togglePressureData" disabled>enable pressure data</button>
      <button id="resetPressureRange" disabled>reset pressure range</button>
      <button id="toggleGameRotation" disabled>enable gameRotation</button>
      <br />
      <button id="togglePressureAutoRange" disabled>
        disable pressure autoRange
      </button>
      <button id="togglePressureMotionAutoRange" disabled>
        enable motion pressure autoRange
      </button>
      <br />
      <button id="toggleGame">start game</button>
      <label>
        <canvas
          id="centerOfPressureInput"
          width="20"
          height="20"
          data-radius="3"
          data-min-x="0"
          data-max-x="1"
          data-min-y="0"
          data-max-y="1"
          data-input
        ></canvas>
      </label>
    </div>

    <div id="centerOfPressureContainer">
      <div id="centerOfPressureRange">
        <div id="centerOfPressureRange2">
          <div id="centerOfPressure">
            <div class="visual"></div>
          </div>
        </div>
        <div id="target">
          <div class="visual">
            <div class="ring"></div>
          </div>
        </div>
      </div>
    </div>

    <br />
    <div>
      <button id="toggleGlassesConnection">connect</button>
      <label>
        file transfer progress: <span></span>
        <progress value="0" id="glassesFileTransferProgress"></progress>
      </label>
      <label class="verticalLabel">
        <span>brightness</span>
        <select id="setGlassesDisplayBrightness">
          <optgroup label="select brightness"></optgroup>
        </select>
      </label>
      <br />
      <canvas id="glassesDisplay" width="640" height="400"></canvas>
    </div>
  </body>
</html>
