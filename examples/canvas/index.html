<html>
  <head>
    <title>Canvas | BrilliantSole JavaScript SDK</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <script type="module" src="./script.js"></script>

    <script src="../utils/mediapipe/handLandmarker.js" type="module"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
      crossorigin="anonymous"
    ></script>

    <script src="../utils/misc/cameraSelect.js"></script>
  </head>
  <style>
    img,
    canvas {
      width: 100%;
      height: 100%;
    }

    html,
    body {
      touch-action: manipulation;
    }

    #imageContainer {
      position: relative;
      display: grid;
      width: 200px;
      height: fit-content;
    }
    #imageOverlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      touch-action: none;
      z-index: 1;
    }
    #imageContainer > img {
      width: 100%;
      height: 100%;
    }

    #drawingContainer {
      position: relative;
      display: grid;
      width: 360;
      height: fit-content;
      border: solid black;
      overflow: hidden;
      touch-action: none;
    }

    #drawingCursor {
      position: absolute;
      top: 0;
      left: 0;
      width: 0.5rem;
      height: 0.5rem;
      pointer-events: none;
      z-index: 1;
    }
    #drawingCursor > div {
      top: -50%;
      left: -50%;
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: black;
      border-radius: 50%;
    }
    #drawingCursor.drawing > div {
      display: none !important;
    }
    #colorPalette {
      display: flex;
      flex-direction: row;
      height: 30px;
    }
    #colorPalette > div {
      aspect-ratio: 1;
    }
  </style>
  <body>
    <nav>
      <a href="../../">home</a>
    </nav>

    <h1>Canvas | BrilliantSole JavaScript SDK</h1>

    <button id="toggleConnection">connect</button>
    <label>
      ip address:
      <input
        id="ipAddress"
        placeholder="192.168.4.1"
        type="text"
        minlength="7"
        maxlength="13"
        size="14"
      />
    </label>
    <br />

    <label><b>camera status:</b> <span id="cameraStatus"></span></label>
    <br />

    <label>
      rate (ms):
      <input id="cameraRate" disabled type="number" min="5" max="40" step="5" />
    </label>
    <br />

    <label>
      resoluton:
      <input
        id="cameraResolution"
        disabled
        type="number"
        min="100"
        max="480"
        step="1"
      />
    </label>
    <br />

    <label>
      quality:
      <input
        id="cameraQuality"
        disabled
        type="number"
        min="0"
        max="100"
        step="1"
      />
    </label>
    <br />

    <label>auto picture: <input type="checkbox" id="autoPicture" /> </label>
    <br />

    <button disabled id="takePicture">take picture</button>
    <progress value="0" id="cameraImageProgress"></progress>
    <br />
    <button disabled id="focusCamera">focus camera</button>
    <br />

    <label>
      webcam
      <select data-camera data-width="320" data-height="240"></select>
    </label>
    <button id="toggleMirrorCamera">mirror camera</button>

    <br />

    <div style="display: flex">
      <div id="imageContainer">
        <canvas
          data-hand-landmarker
          width="300"
          height="300"
          id="imageOverlay"
        ></canvas>
        <img data-hand-landmarker id="cameraImage" />
      </div>
      <video id="cameraVideo" muted autoplay playsinline></video>
    </div>
    <br />
    <div id="drawingContainer">
      <div id="drawingCursor">
        <div></div>
      </div>
      <canvas width="600" height="600" id="drawingCanvas"></canvas>
    </div>
    <br />
    <button id="undoStroke">undo</button>
    <button id="redoStroke">redo</button>
    <button id="clearStrokes">clear</button>
    <br />
    <label id="strokeSize">
      size (<span style="display: inline-block; min-width: 1.1rem">16</span>px)
      <input type="range" value="10" min="4" max="16" step="1" />
    </label>
    <label>
      color
      <input type="color" id="strokeFillStyle" />
    </label>
    <br />
    <div id="colorPalette"></div>
  </body>
</html>
