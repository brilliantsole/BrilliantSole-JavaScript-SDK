<html>
  <head>
    <title>Multiset VPS | BrilliantSole JavaScript SDK</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <script src="../utils/misc/cameraSelect.js"></script>
    <script type="module" src="./script.js"></script>
    <script src="../utils/aframe/aframe-master.min.js"></script>
  </head>
  <style>
    label {
      display: block;
    }
    video,
    img {
      height: 300px;
    }

    #multiSetPoseResponse {
      height: 300px;
    }

    .aframe-inspector-opened a-scene,
    .aframe-inspector-opened a-scene canvas {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 9999;
    }

    #sceneContainer {
      display: grid;
      aspect-ratio: 1.3;
      height: 500px;
    }
    #sceneContainer > * {
      width: 100%;
      height: 100%;
      grid-area: 1 / 1;
    }
  </style>
  <body>
    <nav>
      <a href="../../">home</a>
    </nav>

    <h1>
      <a href="https://www.multiset.ai/" target="_blank">MultiSet</a> |
      BrilliantSole JavaScript SDK
    </h1>

    <label>
      MultiSet clientId (get one
      <a href="https://developer.multiset.ai/credentials" target="_blank">
        here</a
      >)
      <input type="password" data-multiset-credential="clientId" size="37" />
    </label>
    <label>
      MultiSet client secret (get one
      <a href="https://developer.multiset.ai/credentials" target="_blank">
        here</a
      >)
      <input
        type="password"
        data-multiset-credential="clientSecret"
        size="68"
      />
    </label>

    <button id="generateMultiSetToken" disabled>generate token</button>
    <button id="clearMultiSetToken">clear token</button>
    <label>
      MultiSet token
      <input type="password" data-multiset-token="token" size="68" disabled />
    </label>
    <label>
      MultiSet expiration
      <input type="text" data-multiset-token="expiresOn" size="55" disabled />
    </label>
    <br />

    <label>
      type
      <select data-multiset-config="type">
        <optgroup label="select type"></optgroup>
      </select>
    </label>
    <label>
      query type
      <select data-multiset-config="queryType">
        <optgroup label="select query type"></optgroup>
      </select>
    </label>
    <label>
      MultiSet map code
      <input type="text" data-multiset-config="mapCode" size="20" />
    </label>
    <label>
      MultiSet object code
      <input type="text" data-multiset-config="objectCode" size="20" />
    </label>

    <br />

    <label>
      MultiSet Camera fx
      <input
        type="number"
        data-multiset-camera-intrinsic="fx"
        min="100"
        max="2000"
        step="1"
        value="1000"
      />
    </label>
    <label>
      MultiSet Camera fy
      <input
        type="number"
        data-multiset-camera-intrinsic="fy"
        min="100"
        max="2000"
        step="1"
        value="1000"
      />
    </label>
    <label>
      MultiSet Camera px
      <input
        type="number"
        data-multiset-camera-intrinsic="px"
        min="100"
        max="2000"
        step="1"
        value="640"
      />
    </label>
    <label>
      MultiSet Camera py
      <input
        type="number"
        data-multiset-camera-intrinsic="py"
        min="100"
        max="2000"
        step="1"
        value="360"
      />
    </label>

    <br />

    <label>
      camera
      <select data-camera data-width="1280" data-height="720"></select>
    </label>
    <label>
      <button id="grabVideoFrame" disabled>grab video frame</button>
    </label>
    <label>
      auto grab
      <input type="checkbox" data-multiset-grabvideoframe="auto" />
    </label>

    <video id="cameraVideo" autoplay></video>
    <img id="cameraImage" hidden />

    <br />
    <button id="toggleConnection">connect</button>
    <button id="takePicture" disabled>take picture</button>
    <button id="focusCamera" disabled>focus</button>
    <progress value="0" id="deviceImageProgress"></progress>

    <label>
      auto picture
      <input type="checkbox" data-multiset-devicecamera="auto" />
    </label>
    <img id="deviceImage" hidden />

    <br />

    <br />

    <label>
      load model
      <input type="file" id="modelFile" accept=".glb,.gltf" multiple="false"
    /></label>
    <div id="sceneContainer">
      <a-scene id="scene" embedded xr-mode-ui="enabled: false;">
        <a-assets>
          <a-asset-item
            id="glassesModel"
            src="../../assets/3d/glasses.glb"
          ></a-asset-item>
        </a-assets>
        <a-camera
          id="camera"
          look-controls="enabled: true; magicWindowTrackingEnabled: false;"
          wasd-controls="enabled: true; acceleration: 2;"
          position="0 0 0.5"
        ></a-camera>
        <a-entity id="multiSetPose">
          <a-entity class="head">
            <a-box color="red" scale="0.1 0.1 0.1"></a-box>
            <a-entity class="left eye" position="-0.024 0.016 -0.049">
              <a-sphere
                color="white"
                radius="0.02"
                scale="1 1 0.200"
              ></a-sphere>
              <a-sphere
                color="black"
                radius="0.009"
                scale="1 1 0.200"
                position="0 0 -0.004"
              ></a-sphere>
            </a-entity>
            <a-entity class="right eye" position="0.024 0.016 -0.049">
              <a-sphere
                color="white"
                radius="0.02"
                scale="1 1 0.200"
              ></a-sphere>
              <a-sphere
                color="black"
                radius="0.009"
                scale="1 1 0.200"
                position="0 0 -0.004"
              ></a-sphere>
            </a-entity>
          </a-entity>
          <a-entity gltf-model="#glassesModel" visible="false"></a-entity>
        </a-entity>
        <a-entity id="model" position="0 0 0"></a-entity>
        <a-sky color="#ECECEC" hide-on-enter-ar></a-sky>
      </a-scene>
    </div>
    <button id="openInspector">open inspector</button>
    <br />

    <label>
      results
      <pre id="multiSetPoseResponse"></pre>
    </label>
  </body>
</html>
