<html>
  <head>
    <title>Multiset VPS | BrilliantSole JavaScript SDK</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <script type="module" src="./script.js"></script>
  </head>
  <style>
    label {
      display: block;
    }
  </style>
  <body>
    <nav>
      <a href="../../">home</a>
    </nav>

    <h1>
      <a href="https://www.multiset.ai/" target="_blank">MultiSet</a> |
      BrilliantSole JavaScript SDK
    </h1>

    <label>
      <label>
        MultiSet clientId (get one
        <a href="https://developer.multiset.ai/credentials" target="_blank">
          here</a
        >)
        <input type="text" data-multiset-credential="clientId" size="37" />
      </label>
      <label>
        MultiSet client secret (get one
        <a href="https://developer.multiset.ai/credentials" target="_blank">
          here</a
        >)
        <input type="text" data-multiset-credential="clientSecret" size="68" />
      </label>

      <br />
      <button id="toggleConnection">connect</button>
    </label>
  </body>
</html>
