<html>
  <head>
    <title>Balance | BrilliantSole JavaScript SDK</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <script type="module" src="./script.js"></script>
    <script src="../utils/misc/canvasInput.js"></script>
  </head>

  <style>
    #balanceContainer {
      width: 500px;
      height: 80%;
      margin: 1rem;
      display: flex;
      flex-direction: row;
      justify-content: space-evenly;
      gap: 50px;
    }

    .balanceSide {
      height: 100%;
      width: 40%;
      position: relative;
      display: flex;
      justify-content: center;
    }
    .balanceSide .meter {
      height: 100%;
      width: 100%;
      border-radius: 40px;
      border: solid black thick;
      overflow: hidden;
      box-sizing: border-box;
      position: relative;
    }

    .balanceSide .meter .fill {
      background-color: red;
      width: 100%;
      bottom: 0;
      position: absolute;
      height: 0%;
    }

    .balanceSide .target {
      width: calc(100% + 50px);
      position: absolute;
      background-color: yellow;
      margin: auto;
      z-index: 1;
      opacity: 0.5;
      border-radius: 15px;
      height: 20%;
      bottom: 50%;
      display: flex;
    }
    #balanceContainer.hover .balanceSide .target {
      background-color: limegreen;
    }
    #balanceContainer:not(.game) .balanceSide .target {
      display: none;
    }
    .balanceSide .target .ring {
      margin: auto;
      box-sizing: border-box;
      border: solid thick blue;
      width: 100%;
      height: 100%;
      border-radius: 15px;
    }
    #balanceContainer:not(.hover) .balanceSide .target .ring {
      display: none;
    }

    @keyframes shrink {
      from {
        width: 100%;
        height: 100%;
      }
      to {
        width: 0%;
        height: 0%;
      }
    }
    #balanceContainer.hover .balanceSide .target .ring {
      animation-name: shrink;
      animation-duration: 2s;
      animation-timing-function: linear;
    }
  </style>

  <body>
    <nav>
      <a href="../../">home</a>
    </nav>

    <h1>Balance | BrilliantSole JavaScript SDK</h1>

    <button id="toggleServerConnection">connect to server</button>

    <div>
      <h2>available devices</h2>
      <div id="availableDevices">
        <template id="availableDeviceTemplate">
          <div class="availableDevice">
            <ul>
              <li><b>name: </b> <span class="name"></span></li>
              <li><b>type: </b> <span class="type"></span></li>
              <li><button class="toggleConnection">connect</button></li>
            </ul>
          </div>
        </template>
      </div>
    </div>

    <br />

    <div>
      <button id="addDevice">add device</button>
      <button id="togglePressureData" disabled>enable pressure data</button>
      <button id="resetPressureRange" disabled>recalibrate</button>
      <button id="togglePressureAutoRange" disabled>
        disable pressure autoRange
      </button>
      <button id="togglePressureMotionAutoRange" disabled>
        enable motion pressure autoRange
      </button>
      <button id="toggleGameRotation" disabled>enable gameRotation</button>
      <button id="toggleGame">start game</button>
      <label>
        <canvas
          id="centerOfPressureInput"
          width="100"
          height="100"
          data-min-x="0"
          data-max-x="1"
          data-min-y="0"
          data-max-y="1"
          data-input
        ></canvas>
      </label>
    </div>

    <div id="balanceContainer">
      <template id="balanceSideTemplate">
        <div class="balanceSide">
          <div class="target">
            <div class="ring"></div>
          </div>
          <div class="meter">
            <div class="fill"></div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
