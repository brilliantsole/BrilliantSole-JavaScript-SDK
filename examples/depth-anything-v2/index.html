<html>
  <head>
    <title>Depth Anything V2 | BrilliantSole JavaScript SDK</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <script type="module" src="./script.js"></script>

    <script src="../utils/huggingface/depth.js" type="module"></script>

    <script src="../utils/misc/cameraSelect.js"></script>
  </head>
  <style>
    img,
    canvas {
      width: 100%;
      height: 100%;
    }

    html,
    body {
      touch-action: manipulation;
    }

    #imageContainer {
      display: flex;
      height: 200px;
    }
    #imageContainer > img {
      width: 100%;
      height: 100%;
    }
  </style>
  <body>
    <nav>
      <a href="../../">home</a>
    </nav>

    <h1>Depth Anything V2 | BrilliantSole JavaScript SDK</h1>

    <div>
      <button id="toggleConnection">connect</button>
    </div>

    <label><b>camera status:</b> <span id="cameraStatus"></span></label>
    <br />

    <label>
      rate (ms):
      <input id="cameraRate" disabled type="number" min="5" max="40" step="5" />
    </label>
    <br />

    <label>
      resoluton:
      <input
        id="cameraResolution"
        disabled
        type="number"
        min="100"
        max="480"
        step="1"
      />
    </label>
    <br />

    <label>
      quality:
      <input
        id="cameraQuality"
        disabled
        type="number"
        min="0"
        max="100"
        step="1"
      />
    </label>
    <br />

    <label>auto picture: <input type="checkbox" id="autoPicture" /> </label>
    <br />

    <button disabled id="takePicture">take picture</button>
    <progress value="0" id="cameraImageProgress"></progress>
    <br />
    <button disabled id="focusCamera">focus camera</button>
    <br />

    <label>
      webcam
      <select data-camera data-width="320" data-height="240"></select>
    </label>
    <button id="toggleMirrorCamera">mirror camera</button>

    <br />

    <div style="display: flex">
      <div id="imageContainer">
        <canvas
          data-depth-estimator
          width="300"
          height="300"
          id="imageOverlay"
        ></canvas>
        <img data-depth-estimator id="cameraImage" />
      </div>
      <video id="cameraVideo" muted autoplay playsinline></video>
    </div>
  </body>
</html>
